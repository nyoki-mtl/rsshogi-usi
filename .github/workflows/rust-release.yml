name: rust-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Published crate version to reconcile
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish-crate:
    if: github.repository == 'nyoki-mtl/rsshogi-usi' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: 1.95.0

      - name: Validate tag and crate version
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CRATE_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' crates/rsshogi-usi/Cargo.toml | head -n1)"
          if [ -z "${CRATE_VERSION}" ]; then
            echo "Failed to read version from crates/rsshogi-usi/Cargo.toml"
            exit 1
          fi
          if [ "${TAG_VERSION}" != "${CRATE_VERSION}" ]; then
            echo "Tag version (${TAG_VERSION}) does not match crate version (${CRATE_VERSION})"
            exit 1
          fi
          echo "CRATE_VERSION=${CRATE_VERSION}" >> "${GITHUB_ENV}"

      - name: Skip publish if version already exists
        shell: bash
        run: |
          set -euo pipefail
          if curl -A "rsshogi-usi-release-workflow (https://github.com/nyoki-mtl/rsshogi-usi)" \
            -fsS "https://crates.io/api/v1/crates/rsshogi-usi/${CRATE_VERSION}" >/dev/null; then
            echo "rsshogi-usi ${CRATE_VERSION} already exists on crates.io, skipping publish."
            echo "SKIP_PUBLISH=1" >> "${GITHUB_ENV}"
          else
            echo "SKIP_PUBLISH=0" >> "${GITHUB_ENV}"
          fi

      - name: Authenticate with crates.io
        if: env.SKIP_PUBLISH == '0'
        id: crates-io-auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1

      - name: Publish to crates.io
        if: env.SKIP_PUBLISH == '0'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}
        run: cargo publish -p rsshogi-usi

  reconcile-deployment:
    if: github.repository == 'nyoki-mtl/rsshogi-usi' && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      contents: read
    steps:
      - name: Verify published crate
        shell: bash
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          payload="$(curl -A "rsshogi-usi-release-workflow (https://github.com/nyoki-mtl/rsshogi-usi)" \
            -fsS "https://crates.io/api/v1/crates/rsshogi-usi/${RELEASE_VERSION}")"
          jq -e --arg version "${RELEASE_VERSION}" '
            .version.crate == "rsshogi-usi"
            and .version.num == $version
            and .version.yanked == false
          ' <<<"${payload}" >/dev/null
          echo "Verified rsshogi-usi ${RELEASE_VERSION} on crates.io."
