name: docs

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "justfile"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    if: github.repository == 'nyoki-mtl/rsshogi-usi'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install mdBook
        uses: taiki-e/install-action@v2
        with:
          tool: mdbook

      - name: Build book assets
        run: |
          npx --yes esbuild \
            docs/book/src/assets/shogi-board.ts \
            --bundle \
            --format=esm \
            --target=es2018 \
            --outfile=docs/book/src/assets/shogi-board.js \
            --minify

      - name: Build docs
        run: mdbook build docs/book

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book/build

  deploy:
    if: github.repository == 'nyoki-mtl/rsshogi-usi'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
